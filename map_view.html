<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Command Center: Map View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2547f4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: rgba(16, 19, 34, 0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(37, 71, 244, 0.2);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(37, 71, 244, 0.4);
        }
        .map-overlay {
            background: radial-gradient(circle at center, transparent 0%, rgba(16, 19, 34, 0.4) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Header -->
<div class="flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between z-20 border-b border-primary/10">
<div class="text-primary flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center font-display uppercase tracking-widest">
                Command Center
            </h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">memory</span>
</button>
</div>
</div>
<!-- Main Content Area (Map) -->
<div class="relative flex-1 @container">
<!-- Map Background -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center grayscale contrast-125 opacity-40" data-alt="Detailed dark 3D topological map layout" data-location="Tokyo, Japan" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCg3NjokOR65XtPb038OrGkvA8SvcJ22GI4znF3sA-pm7mzKPb7ljRSyep7XLlQ3_mS4BqxyK3OrDNTVfplEx2I3zjE3nOxLyGKf2ByALDbUnSflrk9h88i4irMQyoTMcnV5JaDKY0X0JYnlUTQikGyUcipzoiziU34g3W8z-Pvrxr0YqO2nItP9ty2nNhR2SJfTZmeEftmHVSwuMMyC_fNvz9mcUWfOPZ5UYufaZkTCBOrysKnT9G1tB3agTGMbTWixnfxPY_nYTAZ')">
</div>
<!-- Neon Overlays -->
<div class="absolute inset-0 bg-primary/5 mix-blend-overlay"></div>
<!-- Pulsing Data Points -->
<div class="absolute top-1/3 left-1/4 size-3 bg-primary rounded-full animate-pulse shadow-[0_0_10px_#2547f4]"></div>
<div class="absolute top-1/2 left-1/2 size-4 bg-purple-500 rounded-full animate-pulse shadow-[0_0_12px_#a855f7]"></div>
<div class="absolute top-2/3 right-1/4 size-3 bg-primary rounded-full animate-pulse shadow-[0_0_10px_#2547f4]"></div>
</div>
<!-- UI Overlays -->
<div class="relative z-10 flex flex-col h-full p-4 pointer-events-none">
<!-- Search Bar -->
<div class="pointer-events-auto w-full mb-4">
<label class="flex flex-col h-12">
<div class="flex w-full flex-1 items-stretch rounded-xl overflow-hidden glass-panel border border-primary/20">
<div class="text-primary/60 flex items-center justify-center px-4">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 border-none bg-transparent text-slate-100 focus:outline-0 focus:ring-0 placeholder:text-primary/40 text-sm font-medium" placeholder="SCAN COORDINATES..." value=""/>
</div>
</label>
</div>
<!-- Floating Controls -->
<div class="flex flex-col items-end gap-3 pointer-events-auto ml-auto">
<div class="flex flex-col gap-1">
<button class="flex size-10 items-center justify-center rounded-t-lg glass-panel text-primary border border-primary/20 hover:bg-primary/20">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex size-10 items-center justify-center rounded-b-lg glass-panel text-primary border border-primary/20 hover:bg-primary/20 border-t-0">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<button class="flex size-10 items-center justify-center rounded-lg glass-panel text-primary border border-primary/20 hover:bg-primary/20">
<span class="material-symbols-outlined">near_me</span>
</button>
</div>
<!-- Status Pills -->
<div class="mt-auto flex gap-3 overflow-x-auto pb-4 no-scrollbar pointer-events-auto">
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full glass-panel border border-primary/30 px-4">
<div class="size-2 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></div>
<p class="text-slate-100 text-xs font-bold uppercase tracking-wider">Active</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full glass-panel border border-primary/10 px-4">
<div class="size-2 rounded-full bg-primary animate-pulse"></div>
<p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Searching</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full glass-panel border border-primary/10 px-4">
<div class="size-2 rounded-full bg-slate-600"></div>
<p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Standby</p>
</div>
</div>
</div>
</div>
<!-- Bottom Sheet (Glassmorphism) -->
<div class="glass-panel rounded-t-full p-4 space-y-4 z-30">
<div class="flex justify-center mb-2">
<div class="h-1.5 w-12 rounded-full bg-primary/30"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- System Throughput -->
<div class="p-4 rounded-xl bg-primary/5 border border-primary/10">
<div class="flex justify-between items-start mb-2">
<p class="text-[10px] text-primary font-bold uppercase tracking-widest">System Throughput</p>
<span class="material-symbols-outlined text-primary text-sm">trending_up</span>
</div>
<p class="text-xl font-bold text-slate-100">84.2<span class="text-xs text-primary/60 ml-1">GB/S</span></p>
<div class="h-10 mt-2 flex items-end gap-0.5">
<div class="flex-1 bg-primary/20 h-4 rounded-sm"></div>
<div class="flex-1 bg-primary/30 h-6 rounded-sm"></div>
<div class="flex-1 bg-primary/40 h-8 rounded-sm"></div>
<div class="flex-1 bg-primary/60 h-5 rounded-sm"></div>
<div class="flex-1 bg-primary h-10 rounded-sm"></div>
<div class="flex-1 bg-primary/50 h-7 rounded-sm"></div>
<div class="flex-1 bg-primary/30 h-4 rounded-sm"></div>
</div>
</div>
<!-- Regional Activity -->
<div class="p-4 rounded-xl bg-purple-500/5 border border-purple-500/10">
<div class="flex justify-between items-start mb-2">
<p class="text-[10px] text-purple-500 font-bold uppercase tracking-widest">Regional Activity</p>
<span class="material-symbols-outlined text-purple-500 text-sm">hub</span>
</div>
<p class="text-xl font-bold text-slate-100">1,204<span class="text-xs text-purple-500/60 ml-1">NODES</span></p>
<div class="h-10 mt-2 flex items-center justify-center">
<svg class="w-full h-full overflow-visible" viewbox="0 0 100 40">
<path class="drop-shadow-[0_0_3px_#a855f7]" d="M0,35 Q10,10 20,25 T40,5 T60,30 T80,15 T100,20" fill="none" stroke="#a855f7" stroke-width="2"></path>
</svg>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-primary/20 bg-background-dark px-4 pb-8 pt-2 z-40">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">public</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary/40" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-2xl">monitoring</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary/40" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-2xl">security</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary/40" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-2xl">settings</span>
</div>
</a>
</div>
</div>
</body></html>
